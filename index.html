<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP note: script-src needs 'unsafe-inline' because of the inline <script> block and
      onerror="" attributes on favicon <img> tags below. That weakens the XSS protection a
      CSP normally gives you — a proper fix means moving those onerror handlers to
      addEventListener calls and dropping 'unsafe-inline'. connect-src/img-src are left
      broad (https:) on purpose since the instance URL, proxy URL, and AI model are all
      user-configurable in settings, so a fixed allowlist would break that.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src https:; base-uri 'self'; object-src 'none'; frame-ancestors 'none';" />
    <title>cherrySEARCH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ——— all styles unchanged ——— */
        :root {
            --pink-100: #fff0f5;
            --pink-200: #ffc2d9;
            --pink-300: #ff94bb;
            --pink-400: #ff6b9d;
            --pink-500: #ff3d7f;
            --bg: #f5f5f7;
            --bg-elevated: rgba(255, 255, 255, 0.72);
            --bg-scrolled: rgba(255, 255, 255, 0.9);
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --border: rgba(0, 0, 0, 0.08);
            --accent: var(--pink-400);
            --accent-glow: rgba(255, 107, 157, 0.15);
            --shadow-sm: 0 1px 2px rgba(20, 10, 15, 0.05), 0 2px 6px rgba(20, 10, 15, 0.05), 0 6px 14px -4px rgba(20, 10, 15, 0.06);
            --shadow-md: 0 1px 2px rgba(20, 10, 15, 0.06), 0 6px 16px -4px rgba(20, 10, 15, 0.08), 0 16px 32px -8px rgba(20, 10, 15, 0.08);
            --shadow-lg: 0 2px 4px rgba(20, 10, 15, 0.07), 0 12px 28px -6px rgba(20, 10, 15, 0.1), 0 28px 56px -12px rgba(20, 10, 15, 0.12);
            --shadow-xl: 0 4px 8px rgba(20, 10, 15, 0.08), 0 20px 40px -8px rgba(255, 61, 127, 0.12), 0 40px 80px -16px rgba(20, 10, 15, 0.16);
            --shadow-pressed: inset 0 2px 4px rgba(20, 10, 15, 0.08), inset 0 1px 1px rgba(20, 10, 15, 0.06);
            --rim-light: inset 0 1px 0 rgba(255, 255, 255, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.15);
            --rim-light-soft: inset 0 1px 0 rgba(255, 255, 255, 0.5);
            --depth-edge: inset 0 -2px 3px rgba(20, 10, 15, 0.04);
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            --perspective: 1400px;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --bg-elevated: rgba(28, 28, 30, 0.72);
            --bg-scrolled: rgba(28, 28, 30, 0.9);
            --text: #f5f5f7;
            --text-secondary: #86868b;
            --text-tertiary: #636366;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ff6b9d;
            --accent-glow: rgba(255, 107, 157, 0.2);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4), 0 2px 6px rgba(0, 0, 0, 0.3), 0 6px 14px -4px rgba(0, 0, 0, 0.35);
            --shadow-md: 0 1px 2px rgba(0, 0, 0, 0.4), 0 6px 16px -4px rgba(0, 0, 0, 0.45), 0 16px 32px -8px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 2px 4px rgba(0, 0, 0, 0.45), 0 12px 28px -6px rgba(0, 0, 0, 0.55), 0 28px 56px -12px rgba(0, 0, 0, 0.6);
            --shadow-xl: 0 4px 8px rgba(0, 0, 0, 0.5), 0 20px 40px -8px rgba(255, 61, 127, 0.18), 0 40px 80px -16px rgba(0, 0, 0, 0.7);
            --shadow-pressed: inset 0 2px 4px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(0, 0, 0, 0.3);
            --rim-light: inset 0 1px 0 rgba(255, 255, 255, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            --rim-light-soft: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            --depth-edge: inset 0 -2px 3px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image:
                linear-gradient(rgba(255, 61, 127, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 61, 127, 0.045) 1px, transparent 1px);
            background-size: 42px 42px;
            opacity: 0.85;
            pointer-events: none;
        }
        [data-theme="dark"] body::before {
            background-image:
                linear-gradient(rgba(255, 107, 157, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 157, 0.06) 1px, transparent 1px);
        }
        .grid-reveal {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 61, 127, 0.16) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 61, 127, 0.16) 1px, transparent 1px);
            background-size: 42px 42px;
            -webkit-mask-image: radial-gradient(circle 420px at var(--gx, 50%) var(--gy, 30%), rgba(0, 0, 0, 0.9), transparent 100%);
            mask-image: radial-gradient(circle 420px at var(--gx, 50%) var(--gy, 30%), rgba(0, 0, 0, 0.9), transparent 100%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }
        .grid-reveal.active {
            opacity: 1;
        }
        [data-theme="dark"] .grid-reveal {
            background-image:
                linear-gradient(rgba(255, 107, 157, 0.22) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 157, 0.22) 1px, transparent 1px);
        }

        .bokeh-scene {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .corner-glow {
            position: absolute;
            top: -220px;
            right: -220px;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            will-change: transform;
            background: radial-gradient(circle, var(--pink-300) 0%, var(--pink-400) 40%, transparent 72%);
            filter: blur(90px);
            opacity: 0.3;
            animation: cornerDrift 16s ease-in-out infinite alternate;
        }
        [data-theme="dark"] .corner-glow {
            opacity: 0.16;
            mix-blend-mode: screen;
        }
        @keyframes cornerDrift {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(-30px, 35px) scale(1.08);
            }
        }

        .cursor-glow {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle 360px at var(--mx, 50%) var(--my, 30%), rgba(255, 107, 157, 0.1), transparent 70%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }
        .cursor-glow.active {
            opacity: 1;
        }

        .petal {
            position: absolute;
            top: -40px;
            will-change: transform, opacity;
            animation: petalFall linear infinite;
        }
        .petal svg {
            display: block;
            filter: drop-shadow(0 2px 4px rgba(196, 31, 86, 0.15));
        }
        @keyframes petalFall {
            0% {
                transform: translate(0, -5vh) rotate(0deg);
                opacity: 0;
            }
            8% {
                opacity: 0.85;
            }
            92% {
                opacity: 0.85;
            }
            100% {
                transform: translate(var(--drift, 60px), 110vh) rotate(var(--spin, 320deg));
                opacity: 0;
            }
        }
        [data-theme="dark"] .petal {
            opacity: 0.5;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.25);
            border-radius: 3px;
        }
        ::selection {
            background: rgba(255, 107, 157, 0.25);
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 200;
            padding: 0 32px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        header.scrolled {
            background: var(--bg-scrolled);
            backdrop-filter: saturate(220%) blur(20px);
            -webkit-backdrop-filter: saturate(220%) blur(20px);
            box-shadow: 0 1px 0 rgba(20, 10, 15, 0.04), 0 8px 24px -8px rgba(20, 10, 15, 0.08);
        }
        [data-theme="dark"] header.scrolled {
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.3), 0 8px 24px -8px rgba(0, 0, 0, 0.4);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
        }
        .logo-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.04em;
            color: var(--text);
        }
        .logo-text span {
            color: var(--accent);
            font-weight: 700;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .icon-btn:hover {
            color: var(--text);
            background: rgba(128, 128, 128, 0.1);
            box-shadow: var(--shadow-sm);
        }
        .icon-btn:active {
            transform: scale(0.88);
            box-shadow: var(--shadow-pressed);
        }

        .instance-panel {
            padding: 14px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none;
            animation: slideDown 0.2s ease;
        }
        .instance-panel.open {
            display: block;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .instance-label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .instance-input {
            width: 100%;
            max-width: 460px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 12px;
            font-size: 13px;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: all 0.2s ease;
        }
        .instance-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .hero-landing {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            gap: 28px;
            min-height: calc(100vh - 52px - 49px);
        }
        .hero-landing.hidden {
            display: none;
        }
        .hero-text {
            text-align: center;
        }
        .hero-emoji {
            font-size: 52px;
            margin-bottom: 12px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            transform-style: preserve-3d;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px) rotate(-2deg) scale(1);
            }
            50% {
                transform: translateY(-10px) rotate(2deg) scale(1.02);
            }
        }
        .hero-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text);
            line-height: 1.15;
        }
        .hero-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 8px;
            font-weight: 400;
        }

        .search-wrapper {}
        .search-glass {
            position: relative;
            width: 100%;
            height: 56px;
            border-radius: var(--radius-xl);
            background: rgba(255, 255, 255, 0.42);
            backdrop-filter: saturate(220%) blur(28px);
            -webkit-backdrop-filter: saturate(220%) blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: var(--shadow-xl), var(--rim-light), var(--depth-edge);
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, height 0.3s ease, border-radius 0.3s ease;
            transform-style: preserve-3d;
            will-change: transform;
        }
        [data-theme="dark"] .search-glass {
            background: rgba(28, 28, 30, 0.45);
        }
        .search-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0.05) 28%, transparent 48%, rgba(255, 107, 157, 0.03) 80%, rgba(255, 107, 157, 0.08) 100%);
            pointer-events: none;
        }
        .search-glass .glass-sheen {
            content: '';
            position: absolute;
            inset: -40% -10%;
            pointer-events: none;
            background: radial-gradient(circle at var(--mx, 30%) var(--my, 20%), rgba(255, 255, 255, 0.35), transparent 45%);
            opacity: 0;
            transition: opacity 0.3s ease;
            mix-blend-mode: overlay;
        }
        .search-glass:hover .glass-sheen {
            opacity: 1;
        }
        .search-glass::after {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            pointer-events: none;
        }
        [data-theme="dark"] .search-glass {
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-xl), var(--rim-light), var(--depth-edge);
        }
        [data-theme="dark"] .search-glass::after {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
        }
        .search-glass:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-xl), 0 0 0 5px var(--accent-glow), var(--rim-light);
            transform: perspective(1400px) translateY(-3px) rotateX(2deg) !important;
        }
        .search-glass.compacted {
            height: 48px;
            border-radius: var(--radius-lg);
        }
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            transition: color 0.2s;
            z-index: 2;
        }
        .search-glass:focus-within .search-icon {
            color: var(--accent);
        }
        .search-input {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            padding: 0 48px 0 52px;
            font-size: 17px;
            font-family: var(--font);
            font-weight: 400;
            color: var(--text);
            background: transparent;
            border: none;
            outline: none;
            letter-spacing: -0.01em;
        }
        .search-input::placeholder {
            color: var(--text-secondary);
            font-weight: 400;
        }
        .search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(128, 128, 128, 0.15);
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            transition: all 0.2s ease;
            z-index: 2;
        }
        .search-clear:hover {
            background: rgba(128, 128, 128, 0.25);
            color: var(--text);
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 500px;
        }
        .quick-actions.hidden {
            display: none;
        }
        .quick-chip {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font);
            color: var(--text-secondary);
            background: var(--bg-elevated);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.18s ease, color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            box-shadow: var(--shadow-sm), var(--rim-light-soft);
        }
        .quick-chip:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(255, 107, 157, 0.06);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), var(--rim-light-soft);
        }
        .quick-chip:active {
            transform: translateY(0) scale(0.96);
            box-shadow: var(--shadow-pressed);
        }

        .tabs-wrapper {
            display: flex;
            justify-content: center;
            padding: 10px 32px 0;
        }
        .tabs-glass {
            display: flex;
            gap: 2px;
            padding: 4px;
            background: var(--bg-elevated);
            backdrop-filter: saturate(220%) blur(20px);
            -webkit-backdrop-filter: saturate(220%) blur(20px);
            border: 1px solid var(--border);
            border-radius: 100px;
            box-shadow: var(--shadow-sm), var(--rim-light-soft);
            position: relative;
        }
        .tab-pill {
            position: absolute;
            top: 4px;
            left: 0;
            height: calc(100% - 8px);
            width: 0;
            border-radius: 100px;
            background: var(--accent);
            box-shadow: 0 2px 8px rgba(255, 61, 127, 0.3);
            transform: translateX(0);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), width 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
        }
        .tab-pill.ready {
            opacity: 1;
        }
        .tab {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            font-family: var(--font);
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 100px;
            transition: color 0.25s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            position: relative;
            z-index: 1;
        }
        .tab:hover {
            color: var(--text);
        }
        .tab.active {
            color: white;
        }

        .main-layout {
            flex: 1;
            display: flex;
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 32px 48px;
            gap: 32px;
        }
        .ai-sidebar-col {
            width: 320px;
            flex-shrink: 0;
        }
        .results-col {
            flex: 1;
            min-width: 0;
        }
        .sidebar-col {
            width: 320px;
            flex-shrink: 0;
        }

        .results-search {
            margin: 0 0 18px;
        }
        .results-search-form {
            display: flex;
        }
        .results-search-glass {
            display: flex;
            align-items: center;
            width: 100%;
            height: 40px;
            border-radius: 100px;
            padding: 0 14px;
            background: var(--bg-elevated);
            backdrop-filter: saturate(220%) blur(16px);
            -webkit-backdrop-filter: saturate(220%) blur(16px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm), var(--rim-light-soft);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .results-search-glass:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm), 0 0 0 3px var(--accent-glow), var(--rim-light-soft);
        }
        .results-search-input {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            font-size: 13px;
            font-family: var(--font);
            color: var(--text);
            outline: none;
            padding: 0 8px;
            letter-spacing: -0.01em;
        }
        .results-search-input::placeholder {
            color: var(--text-tertiary);
        }
        .results-search-icon {
            color: var(--text-tertiary);
            flex-shrink: 0;
        }
        .results-search-glass:focus-within .results-search-icon {
            color: var(--accent);
        }
        .results-search-clear {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: none;
            background: rgba(128, 128, 128, 0.12);
            color: var(--text-tertiary);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            padding: 0;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .results-search-clear:hover {
            background: rgba(128, 128, 128, 0.2);
            color: var(--text);
        }

        @media (max-width: 900px) {
            .sidebar-col {
                display: none;
            }
            .ai-sidebar-col {
                width: 100%;
                display: block;
            }
            .results-col {
                order: 1;
            }
            .main-layout {
                padding: 16px 12px 48px;
                flex-direction: column;
            }
            .tabs-wrapper {
                padding: 10px 12px 0;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                justify-content: flex-start;
            }

            font-size: 9px;
            color: var(--text-secondary);
            background: rgba(128, 128, 128, 0.1);
            padding: 2px 6px;
            border-radius: 100px;
            flex-shrink: 0;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .result-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: -0.015em;
            line-height: 1.3;
            transition: color 0.2s;
            position: relative;
            z-index: 1;
        }
        .result-card:hover .result-title {
            color: var(--accent);
        }
        .result-snippet {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }
        .image-card {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 4/3;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.25s ease;
            background: rgba(128, 128, 128, 0.08);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transform-style: preserve-3d;
            will-change: transform;
        }
        .image-card:hover {
            transform: perspective(900px) translateY(-5px) scale(1.02) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
            box-shadow: var(--shadow-lg);
            border-color: rgba(255, 107, 157, 0.35);
        }
        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }
        .image-card:hover img {
            transform: scale(1.08);
        }
        .image-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 10px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .image-card:hover .image-card-overlay {
            opacity: 1;
        }
        .image-card-title {
            font-size: 11px;
            color: white;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .image-card-source {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }

        .wiki-card {
            position: sticky;
            top: 76px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: linear-gradient(160deg, rgba(255, 107, 157, 0.06) 0%, var(--bg-elevated) 30%);
            backdrop-filter: blur(16px) saturate(150%);
            -webkit-backdrop-filter: blur(16px) saturate(150%);
            border: 1px solid rgba(255, 107, 157, 0.15);
            box-shadow: var(--shadow-lg), var(--rim-light-soft);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            will-change: transform;
        }
        .wiki-card:hover {
            transform: perspective(900px) translateY(-3px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
            box-shadow: var(--shadow-xl), var(--rim-light-soft);
        }
        [data-theme="dark"] .wiki-card {
            background: linear-gradient(160deg, rgba(255, 107, 157, 0.08) 0%, rgba(28, 28, 30, 0.85) 30%);
            border-color: rgba(255, 107, 157, 0.12);
        }
        .wiki-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--pink-300), var(--pink-500));
        }
        .wiki-image-placeholder {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.12), rgba(255, 61, 127, 0.08));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .wiki-content {
            padding: 18px 20px;
            position: relative;
        }
        .wiki-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 4px;
        }
        .wiki-description {
            font-size: 11px;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }
        .wiki-extract {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .wiki-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .wiki-link:hover {
            opacity: 0.7;
        }
        .wiki-loading {
            padding: 40px 20px;
            text-align: center;
        }
        .wiki-loading .loader {
            margin: 0 auto;
        }

        .scroll-loader {
            display: flex;
            justify-content: center;
            padding: 24px 0;
            gap: 8px;
            align-items: center;
        }
        .scroll-loader.hidden {
            display: none;
        }
        .scroll-loader-text {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        footer {
            padding: 16px 32px;
            text-align: center;
            font-size: 11px;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border);
        }
        footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        footer a:hover {
            text-decoration: underline;
        }

        /* ——— toast notifications ——— */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            z-index: 300;
            pointer-events: none;
            align-items: center;
        }
        .toast {
            background: var(--bg-elevated);
            backdrop-filter: blur(16px) saturate(160%);
            -webkit-backdrop-filter: blur(16px) saturate(160%);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg), var(--rim-light-soft);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            padding: 12px 18px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: min(90vw, 380px);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: auto;
        }
        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .toast-icon {
            flex-shrink: 0;
            color: var(--accent);
        }

        /* ——— skeleton loading ——— */
        .skeleton-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .skeleton-card {
            pointer-events: none;
        }
        .skeleton-line {
            border-radius: 6px;
            background: linear-gradient(90deg, var(--border) 25%, var(--accent-glow) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: skeletonShimmer 1.4s ease-in-out infinite;
        }
        @keyframes skeletonShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ——— back to top ——— */
        .back-to-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            box-shadow: var(--shadow-lg), var(--rim-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.25s ease, transform 0.25s ease, background 0.2s ease;
            pointer-events: none;
            z-index: 150;
        }
        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .back-to-top:hover {
            transform: translateY(-3px);
        }
        .back-to-top:active {
            transform: translateY(0) scale(0.94);
        }
        @media (max-width: 640px) {
            .back-to-top {
                bottom: 20px;
                right: 16px;
                width: 40px;
                height: 40px;
            }
        }

        /* ——— image lightbox ——— */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(10, 5, 8, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 400;
            padding: 40px;
        }
        .lightbox.visible {
            display: flex;
        }
        .lightbox-content {
            max-width: 90vw;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .lightbox-img {
            max-width: 100%;
            max-height: 74vh;
            border-radius: var(--radius);
            box-shadow: var(--shadow-xl);
            object-fit: contain;
        }
        .lightbox-info {
            text-align: center;
            color: #fff;
        }
        .lightbox-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            max-width: 70vw;
        }
        .lightbox-source {
            font-size: 12px;
            color: var(--pink-300);
            text-decoration: none;
        }
        .lightbox-source:hover {
            text-decoration: underline;
        }
        .lightbox-close,
        .lightbox-nav {
            position: fixed;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: background 0.2s ease;
        }
        .lightbox-close:hover,
        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.22);
        }
        .lightbox-close {
            top: 24px;
            right: 24px;
        }
        .lightbox-prev {
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
        }
        .lightbox-next {
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
        }
        @media (max-width: 640px) {
            .lightbox { padding: 16px; }
            .lightbox-close { top: 12px; right: 12px; }
            .lightbox-prev { left: 8px; }
            .lightbox-next { right: 8px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
