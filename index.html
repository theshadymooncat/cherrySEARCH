    <script>
        const state = {
            query: "",
            results: [],
            loading: false,
            searched: false,
            startTime: 0,
            category: "general",
            page: 0,
            allLoaded: false,
            loadingMore: false,
            instance: localStorage.getItem("cherrysearch-instance") || "https://searx.linxx.net",
            proxyEnabled: localStorage.getItem("cherrysearch-proxyEnabled") === "true",
            proxyUrl: localStorage.getItem("cherrysearch-proxyUrl") || "",
            aiEnabled: localStorage.getItem("cherrysearch-aiEnabled") === "true",
            aiKey: localStorage.getItem("cherrysearch-aiKey") || "",
            aiModel: localStorage.getItem("cherrysearch-aiModel") || "openrouter/free:online",
            aiOverview: null,
            aiLoading: false,
            aiModelUsed: null,
            aiSources: [],
            theme: localStorage.getItem("cherrysearch-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ?
                "dark" : "light"),
            answers: [],
            corrections: [],
            suggestions: [],
            news: [],
            newsLoaded: false,
        };

        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const header = $("#header");
        const heroLanding = $("#hero-landing");
        const searchForm = $("#search-form");
        const quickActions = $("#quick-actions");
        const searchInput = $("#search-input");
        const searchGlass = $("#search-glass");
        const searchClear = $("#search-clear");
        const tabs = $("#tabs");
        const tabsGlass = $("#tabs-glass");
        const tabPill = $("#tab-pill");
        const mainLayout = $("#main-layout");
        const resultsContainer = $("#results-container");
        const resultsCol = $("#results-col");
        const resultsSearch = $("#results-search");
        const resultsSearchInput = $("#results-search-input");
        const resultsSearchClear = $("#results-search-clear");
        const resultsSearchForm = $("#results-search-form");
        const wikiCard = $("#wiki-card");
        const aiSidebar = $("#ai-sidebar");
        const aiSidebarCol = $("#ai-sidebar-col");
        const sidebarCol = $("#sidebar-col");
        const instancePanel = $("#instance-panel");
        const instanceToggle = $("#instance-toggle");
        const instanceInput = $("#instance-input");
        const proxyToggle = $("#proxy-toggle");
        const proxyInput = $("#proxy-input");
        const aiToggle = $("#ai-toggle");
        const aiKeyInput = $("#ai-key-input");
        const aiModelInput = $("#ai-model-input");
        const themeToggle = $("#theme-toggle");
        const sunIcon = $("#sun-icon");
        const moonIcon = $("#moon-icon");
        const logoLink = $("#logo-link");
        const toastContainer = $("#toast-container");
        const backToTop = $("#back-to-top");
        const lightbox = $("#lightbox");
        const lightboxImg = $("#lightbox-img");
        const lightboxTitle = $("#lightbox-title");
        const lightboxSource = $("#lightbox-source");
        const lightboxClose = $("#lightbox-close");
        const lightboxPrev = $("#lightbox-prev");
        const lightboxNext = $("#lightbox-next");

        function goToLanding() {
            const params = new URLSearchParams(location.search);
            params.delete("q");
            const newUrl = params.toString() ? `?${params.toString()}` : location.pathname;
            history.pushState({}, "", newUrl);

            state.query = "";
            state.searched = false;
            state.results = [];
            state.aiOverview = null;
            state.aiLoading = false;
            state.aiModelUsed = null;
            state.aiSources = [];
            state.news = [];
            state.newsLoaded = false;
            state.suggestions = [];

            heroLanding.classList.remove("hidden");
            quickActions.classList.remove("hidden");
            searchGlass.classList.remove("compacted");
            tabs.style.display = "none";
            mainLayout.style.display = "none";
            searchInput.value = "";
            searchClear.style.display = "none";
            resultsSearchInput.value = "";
            resultsSearchClear.style.display = "none";
            resultsContainer.innerHTML = "";
            aiSidebar.style.display = "none";
            aiSidebarCol.style.display = "none";
            wikiCard.style.display = "none";
            wikiCard.innerHTML = "";
            sidebarCol.style.display = "none";

            aiSidebar.innerHTML = "";
            aiSidebar.classList.remove("mobile-ai");

            window.onscroll = null;
            document.documentElement.scrollTop = 0;
            searchInput.focus();
        }

        logoLink.addEventListener("click", (e) => {
            e.preventDefault();
            goToLanding();
        });

        function init() {
            instanceInput.value = state.instance;
            proxyToggle.checked = state.proxyEnabled;
            proxyInput.value = state.proxyUrl;
            if (state.proxyEnabled) proxyInput.style.display = "";
            aiToggle.checked = state.aiEnabled;
            aiKeyInput.value = state.aiKey;
            aiModelInput.value = state.aiModel;
            if (state.aiEnabled) { aiKeyInput.style.display = "";
                aiModelInput.style.display = ""; }
            applyTheme(state.theme);
            header.classList.add("scrolled");

            window.addEventListener("scroll", () => {
                header.classList.toggle("scrolled", window.scrollY > 10);
            }, { passive: true });

            window.addEventListener("scroll", () => {
                backToTop.classList.toggle("visible", window.scrollY > 600);
            }, { passive: true });
            backToTop.addEventListener("click", () => {
                window.scrollTo({ top: 0, behavior: "smooth" });
            });

            setupGlassTilt();
            setupCardTilt();
            setupBackgroundGlow();
            spawnPetals();
            positionAiSidebar();

            const params = new URLSearchParams(window.location.search);
            const urlQuery = params.get("q");
            if (urlQuery) {
                searchInput.value = urlQuery;
                searchClear.style.display = "flex";
                performSearch(urlQuery);
            }

            window.addEventListener("popstate", () => {
                const params = new URLSearchParams(location.search);
                const q = params.get("q");
                if (q) {
                    searchInput.value = q;
                    searchClear.style.display = "flex";
                    performSearch(q);
                } else {
                    goToLanding();
                }
            });
        }

        function setupBackgroundGlow() {
            if (window.matchMedia("(pointer: coarse)").matches) return;
            const cursorGlow = $("#cursor-glow");
            const gridReveal = $("#grid-reveal");
            let raf = null;
            window.addEventListener("mousemove", (e) => {
                if (raf) return;
                raf = requestAnimationFrame(() => {
                    const xPct = (e.clientX / window.innerWidth) * 100;
                    const yPct = (e.clientY / window.innerHeight) * 100;
                    gridReveal.style.setProperty("--gx", `${xPct}%`);
                    gridReveal.style.setProperty("--gy", `${yPct}%`);
                    cursorGlow.style.setProperty("--mx", `${xPct}%`);
                    cursorGlow.style.setProperty("--my", `${yPct}%`);
                    gridReveal.classList.add("active");
                    cursorGlow.classList.add("active");
                    raf = null;
                });
            }, { passive: true });
            window.addEventListener("mouseleave", () => {
                gridReveal.classList.remove("active");
                cursorGlow.classList.remove("active");
            });
        }

        function spawnPetals() {
            const scene = $("#bokeh-scene");
            if (!scene) return;
            const count = window.innerWidth < 700 ? 7 : 13;
            const petalSvg = (hue) => `
            <svg width="${hue.size}" height="${hue.size}" viewBox="0 0 24 24" fill="none">
              <path d="M12 22C12 22 4 16 4 9C4 5 7 2 12 2C17 2 20 5 20 9C20 16 12 22 12 22Z"
                    fill="${hue.fill}" opacity="${hue.op}"/>
            </svg>`;
            const fills = ["var(--pink-200)", "var(--pink-300)", "var(--pink-400)", "#ffffff"];
            let html = "";
            for (let i = 0; i < count; i++) {
                const size = 8 + Math.random() * 12;
                const left = Math.random() * 100;
                const duration = 16 + Math.random() * 18;
                const delay = Math.random() * -28;
                const drift = (Math.random() * 160 - 80).toFixed(0);
                const spin = (240 + Math.random() * 240).toFixed(0);
                const fill = fills[Math.floor(Math.random() * fills.length)];
                const op = (0.35 + Math.random() * 0.3).toFixed(2);
                html +=
                    `<div class="petal" style="left:${left}%; --drift:${drift}px; --spin:${spin}deg; animation-duration:${duration}s; animation-delay:${delay}s;">${petalSvg({ size: size.toFixed(0), fill, op })}</div>`;
            }
            scene.insertAdjacentHTML("beforeend", html);
        }

        function setupGlassTilt() {
            if (window.matchMedia("(pointer: coarse)").matches) return;
            const maxTilt = 3.5;
            searchGlass.addEventListener("mousemove", (e) => {
                const r = searchGlass.getBoundingClientRect();
                const px = (e.clientX - r.left) / r.width;
                const py = (e.clientY - r.top) / r.height;
                const rotY = (px - 0.5) * maxTilt * 2;
                const rotX = (0.5 - py) * maxTilt;
                searchGlass.style.transform =
                    `perspective(1400px) translateY(-2px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
                searchGlass.style.setProperty("--mx", `${px * 100}%`);
                searchGlass.style.setProperty("--my", `${py * 100}%`);
            });
            searchGlass.addEventListener("mouseleave", () => {
                if (!searchGlass.matches(":focus-within")) searchGlass.style.transform = "";
            });
        }

        function setupCardTilt() {
            if (window.matchMedia("(pointer: coarse)").matches) return;
            document.addEventListener("mousemove", (e) => {
                const card = e.target.closest(".result-card, .image-card, .wiki-card");
                if (!card) return;
                const r = card.getBoundingClientRect();
                const px = (e.clientX - r.left) / r.width;
                const py = (e.clientY - r.top) / r.height;
                const rotY = (px - 0.5) * 4;
                const rotX = (0.5 - py) * 3;
                card.style.setProperty("--rx", `${rotX}deg`);
                card.style.setProperty("--ry", `${rotY}deg`);
                card.style.setProperty("--mx", `${px * 100}%`);
                card.style.setProperty("--my", `${py * 100}%`);
            });
            document.addEventListener("mouseleave", (e) => {
                const card = e.target.closest?.(".result-card, .image-card, .wiki-card");
                if (card) { card.style.removeProperty("--rx");
                    card.style.removeProperty("--ry"); }
            }, true);
        }

        function applyTheme(t) {
            state.theme = t;
            document.documentElement.setAttribute("data-theme", t);
            localStorage.setItem("cherrysearch-theme", t);
            const d = t === "dark";
            sunIcon.style.display = d ? "block" : "none";
            moonIcon.style.display = d ? "none" : "block";
        }
        themeToggle.addEventListener("click", () => applyTheme(state.theme === "dark" ? "light" : "dark"));

        instanceToggle.addEventListener("click", () => {
            instancePanel.classList.toggle("open");
            if (instancePanel.classList.contains("open")) { instanceInput.focus();
                instanceInput.select(); }
        });
        instanceInput.addEventListener("change", () => {
            state.instance = instanceInput.value.trim().replace(/\/$/, "");
            localStorage.setItem("cherrysearch-instance", state.instance);
        });

        proxyToggle.addEventListener("change", () => {
            state.proxyEnabled = proxyToggle.checked;
            localStorage.setItem("cherrysearch-proxyEnabled", state.proxyEnabled);
            proxyInput.style.display = state.proxyEnabled ? "" : "none";
        });

        proxyInput.addEventListener("change", () => {
            state.proxyUrl = proxyInput.value.trim();
            localStorage.setItem("cherrysearch-proxyUrl", state.proxyUrl);
        });

        aiToggle.addEventListener("change", () => {
            state.aiEnabled = aiToggle.checked;
            localStorage.setItem("cherrysearch-aiEnabled", state.aiEnabled);
            const show = state.aiEnabled ? "" : "none";
            aiKeyInput.style.display = show;
            aiModelInput.style.display = show;
        });

        aiKeyInput.addEventListener("input", () => {
            state.aiKey = aiKeyInput.value.trim();
            localStorage.setItem("cherrysearch-aiKey", state.aiKey);
        });

        aiModelInput.addEventListener("change", () => {
            state.aiModel = aiModelInput.value.trim();
            localStorage.setItem("cherrysearch-aiModel", state.aiModel);
        });

        tabs.addEventListener("click", (e) => {
            const tab = e.target.closest(".tab");
            if (!tab) return;
            $$(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            moveTabPill(tab);
            state.category = tab.dataset.cat;
            state.page = 0;
            state.allLoaded = false;
            state.news = [];
            state.newsLoaded = false;
            if (state.category !== "general") {
                aiSidebar.style.display = "none";
                aiSidebarCol.style.display = "none";
                wikiCard.style.display = "none";
                wikiCard.innerHTML = "";
                sidebarCol.style.display = "none";
            } else {
                // Ensure AI sidebar is shown if a search is active
                if (state.searched) {
                    aiSidebarCol.style.display = "block";
                    aiSidebar.style.display = "block";
                    renderAiSidebar();
                }
            }
            if (state.searched) performSearch(state.query);
        });

        searchForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const q = searchInput.value.trim();
            if (q) performSearch(q);
        });

        quickActions.addEventListener("click", (e) => {
            const chip = e.target.closest(".quick-chip");
            if (!chip) return;
            searchInput.value = chip.dataset.query;
            searchClear.style.display = "flex";
            performSearch(chip.dataset.query);
        });

        searchInput.addEventListener("input", () => {
            searchClear.style.display = searchInput.value ? "flex" : "none";
        });
        searchClear.addEventListener("click", () => {
            searchInput.value = "";
            searchClear.style.display = "none";
            searchInput.focus();
        });

        resultsSearchForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const q = resultsSearchInput.value.trim();
            if (q) performSearch(q);
        });

        resultsSearchInput.addEventListener("input", () => {
            resultsSearchClear.style.display = resultsSearchInput.value ? "flex" : "none";
        });

        resultsSearchClear.addEventListener("click", () => {
            resultsSearchInput.value = "";
            resultsSearchClear.style.display = "none";
            resultsSearchInput.focus();
        });

        document.addEventListener("keydown", (e) => {
            const isInput = document.activeElement === searchInput || document.activeElement === instanceInput ||
                document.activeElement === resultsSearchInput || document.activeElement === aiKeyInput ||
                document.activeElement === aiModelInput || document.activeElement?.tagName === "TEXTAREA";

            if (e.key === "/" && !isInput) {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === "Escape") {
                searchInput.blur();
                searchInput.value = "";
                searchClear.style.display = "none";
            }
            if (!isInput && e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                searchInput.focus();
            }
        });

        const faviconColors = [
            '#FF6B9D', '#5B8DEF', '#34C759', '#FF9500', '#AF52DE',
            '#FF375F', '#00C7BE', '#FF6482', '#5AC8FA', '#FFCC00',
            '#30D158', '#BF5AF2', '#636366', '#0A84FF', '#FF9F0A',
        ];

        function getFaviconColor(hostname) {
            let hash = 0;
            for (let i = 0; i < hostname.length; i++) {
                hash = ((hash << 5) - hash) + hostname.charCodeAt(i);
                hash |= 0;
            }
            return faviconColors[Math.abs(hash) % faviconColors.length];
        }

        function getFaviconLetter(hostname) {
            return (hostname.charAt(0) || "?").toUpperCase();
        }

        function getFaviconUrl(hostname) {
            return `https://www.google.com/s2/favicons?domain=${hostname}&sz=32`;
        }

        function shade(hex, percent) {
            const num = parseInt(hex.replace("#", ""), 16);
            let r = (num >> 16) + Math.round(2.55 * percent);
            let g = ((num >> 8) & 0x00FF) + Math.round(2.55 * percent);
            let b = (num & 0x0000FF) + Math.round(2.55 * percent);
            r = Math.max(0, Math.min(255, r));
            g = Math.max(0, Math.min(255, g));
            b = Math.max(0, Math.min(255, b));
            return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, "0")}`;
        }

        function buildSearchUrl(query, page, category) {
            const cat = category || state.category;
            const path =
                `/search?q=${encodeURIComponent(query)}&format=json&categories=${cat === "general" ? "general" : cat}&pageno=${page || 1}`;
            const rawUrl = `${state.instance}${path}`;
            return state.proxyEnabled ? `${state.proxyUrl}${encodeURIComponent(rawUrl)}` : rawUrl;
        }

        function formatAiText(text) {
            const d = document.createElement("div");
            d.textContent = text;
            let html = d.innerHTML;
            html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
            html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
            html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                '<a href="$2" target="_blank" rel="noopener noreferrer" class="ai-cite">$1</a>');
            html = html.replace(/\[([a-zA-Z0-9]([a-zA-Z0-9-]*\.)+[a-zA-Z]{2,})\]/g,
                '<a href="https://$1" target="_blank" rel="noopener noreferrer" class="ai-cite">$1</a>');
            html = html.replace(/^### (.+)$/gm, "<h4>$1</h4>");
            html = html.replace(/^## (.+)$/gm, "<h3>$1</h3>");
            html = html.replace(/^- (.+)$/gm, "<li>$1</li>");
            html = html.replace(/(<li>.*<\/li>\n?)+/g, "<ul>$&</ul>");
            html = html.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
            const parts = html.split(/\n\n+/);
            html = parts.map(p => {
                p = p.trim();
                if (!p) return "";
                if (p.startsWith("<") && (p.endsWith(">") || p.endsWith("</ul>") || p.endsWith("</h3>") || p
                    .endsWith("</h4>"))) return p;
                return `<p>${p}</p>`;
            }).join("\n");
            html = html.replace(/\n/g, "<br>");
            html = html.replace(/<p><br><\/p>/g, "");
            html = html.replace(/<p><ul>/g, "<ul>").replace(/<\/ul><\/p>/g, "</ul>");
            html = html.replace(/<p><li>/g, "<li>").replace(/<\/li><\/p>/g, "</li>");
            return html;
        }

        // ─── Move the AI overview between its desktop sidebar slot and its
        // mobile slot (right after the search bar, above the results list) ───
        function positionAiSidebar() {
            const isMobile = window.innerWidth <= 900;
            if (isMobile) {
                if (aiSidebarCol.parentElement !== resultsCol || aiSidebarCol.previousElementSibling !== resultsSearch) {
                    resultsSearch.insertAdjacentElement("afterend", aiSidebarCol);
                }
            } else {
                if (aiSidebarCol.parentElement !== mainLayout || mainLayout.firstElementChild !== aiSidebarCol) {
                    mainLayout.insertBefore(aiSidebarCol, mainLayout.firstChild);
                }
            }
        }

        // ─── FIXED: always show AI sidebar when search is active (general) ───
        function renderAiSidebar() {
            positionAiSidebar();
            const isMobile = window.innerWidth <= 900;

            // If not on general tab or no search active, hide
            if (state.category !== "general" || !state.searched) {
                aiSidebar.style.display = "none";
                aiSidebarCol.style.display = "none";
                return;
            }

            // Always show the container
            aiSidebarCol.style.display = "block";
            aiSidebar.style.display = "block";

            // Loading state
            if (state.aiLoading) {
                aiSidebar.className = "ai-overview";
                aiSidebar.innerHTML = `
                    <div class="ai-overview-loading" style="padding:20px 22px">
                        <div class="loader" style="width:20px;height:20px"><div class="loader-ring" style="border-width:2px"></div><div class="loader-ring" style="border-width:2px"></div></div>
                        <span>Searching the web...</span>
                    </div>`;
                return;
            }

            // If AI is disabled or no key, hide the AI overview box entirely
            if (!state.aiEnabled || !state.aiKey) {
                aiSidebar.style.display = "none";
                aiSidebarCol.style.display = "none";
                return;
            }

            // If we have content
            if (state.aiOverview) {
                const modelLabel = state.aiModelUsed ? ` · ${state.aiModelUsed}` : "";
                const sourcesHtml = state.aiSources.length ?
                    `<div class="ai-overview-sources" style="margin-top:8px;padding:0 22px 18px;border-top:1px solid rgba(255,107,157,0.12)">
                        <div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;padding-top:12px;margin-bottom:6px">Sources</div>
                        ${state.aiSources.slice(0,4).map(s =>
                            `<a href="${escapeHtml(s.url || s.link || "#")}" target="_blank" rel="noopener noreferrer" style="display:block;font-size:11px;color:var(--text-secondary);text-decoration:none;padding:4px 0;transition:color 0.15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color=''">${escapeHtml(s.title || s.name || s.url || "Source")}</a>`
                        ).join("")}
                    </div>` : "";

                if (isMobile) {
                    aiSidebar.className = "ai-overview mobile-ai";
                    const contentHtml = formatAiText(state.aiOverview);
                    aiSidebar.innerHTML = `
                        <div class="ai-overview-header">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a3 3 0 0 0-3 3v1h6V6a3 3 0 0 0-3-3z"/><path d="M19 10v7a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4v-7"/><line x1="5" y1="10" x2="19" y2="10"/></svg>
                            AI Overview
                            <span style="font-weight:400;font-size:10px;color:var(--text-tertiary);margin-left:auto">${escapeHtml(modelLabel)}</span>
                        </div>
                        <div class="ai-overview-scroll" id="ai-scroll">
                            <div class="ai-overview-body">${contentHtml}</div>
                            ${sourcesHtml}
                        </div>
                        <div class="ai-overview-fade" id="ai-fade"></div>
                        <div class="scroll-hint" id="scroll-hint">⋮ scroll ⋮</div>
                    `;
                    requestAnimationFrame(() => {
                        const scrollEl = document.getElementById("ai-scroll");
                        const fade = document.getElementById("ai-fade");
                        const hint = document.getElementById("scroll-hint");
                        if (scrollEl) {
                            const needsScroll = scrollEl.scrollHeight > scrollEl.clientHeight;
                            if (!needsScroll) {
                                if (fade) fade.classList.add("hidden-fade");
                                if (hint) hint.classList.add("hidden-hint");
                            } else {
                                scrollEl.addEventListener("scroll", () => {
                                    if (hint) hint.classList.add("hidden-hint");
                                }, { once: true });
                                setTimeout(() => {
                                    if (hint) hint.classList.add("hidden-hint");
                                }, 6000);
                            }
                        }
                    });
                    return;
                }

                // Desktop
                aiSidebar.className = "ai-overview";
                aiSidebar.innerHTML = `
                    <div class="ai-overview-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a3 3 0 0 0-3 3v1h6V6a3 3 0 0 0-3-3z"/><path d="M19 10v7a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4v-7"/><line x1="5" y1="10" x2="19" y2="10"/></svg>
                        AI Overview
                        <span style="font-weight:400;font-size:10px;color:var(--text-tertiary);margin-left:auto">${escapeHtml(modelLabel)}</span>
                    </div>
                    <div class="ai-overview-body">${formatAiText(state.aiOverview)}</div>
                    ${sourcesHtml}`;
                return;
            }

            // If no overview and not loading, show a fallback (e.g., still generating or failed)
            // This ensures the container stays visible
            aiSidebar.className = "ai-overview";
            aiSidebar.innerHTML = `
                <div class="ai-overview-body" style="padding:16px 22px;color:var(--text-tertiary);text-align:center;font-size:13px;">
                    <span style="display:block;font-size:20px;margin-bottom:6px;">🍒</span>
                    Could not generate an AI overview at this time.
                </div>`;
        }

        async function fetchAiOverview(query) {
            if (!state.aiEnabled || !state.aiKey) {
                renderAiSidebar();
                return;
            }
            state.aiLoading = true;
            state.aiOverview = null;
            state.aiModelUsed = null;
            state.aiSources = [];
            renderAiSidebar();

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${state.aiKey}`,
                        "HTTP-Referer": window.location.origin
                    },
                    body: JSON.stringify({
                        model: state.aiModel || "openrouter/free:online",
                        messages: [
                            { role: "system",
                                content: "You are an AI search overview. Provide a short, concise answer (3-5 sentences max) to the user's query based on web search results. Use bullet points sparingly. Keep it tight and factual." },
                            { role: "user", content: query }
                        ],
                        web_search: true
                    })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                state.aiOverview = data.choices?.[0]?.message?.content || null;
                state.aiModelUsed = data.model || null;
                let raw = data.citations || data.choices?.[0]?.message?.citations || data.choices?.[0]?.message
                    ?.annotations || [];
                state.aiSources = raw.map(c => {
                    if (typeof c === "string") return { url: c, title: c.replace(/^https?:\/\//, "").split("/")[0] };
                    if (typeof c === "object") return { url: c.url || c.link || c.href || "#", title: c.title || c
                            .name || c.source || c.url?.replace(/^https?:\/\//, "").split("/")[0] || "Source" };
                    return { url: "#", title: "Source" };
                }).filter(s => s.url !== "#" && s.title);
                if (!state.aiSources.length && state.aiOverview) {
                    const urlRegex = /\[(\d+)\]\(([^)]+)\)|\[(\d+)\]:\s*(https?:\/\/[^\s\n]+)/g;
                    let match;
                    const fallback = [];
                    while ((match = urlRegex.exec(state.aiOverview)) !== null) {
                        const url = match[2] || match[4];
                        fallback.push({ url, title: `Source ${match[1] || match[3]}` });
                    }
                    state.aiSources = fallback.slice(0, 4);
                }
            } catch (err) {
                console.error("AI overview failed:", err);
                state.aiOverview = null;
                state.aiSources = [];
                showToast("AI overview failed to load.");
            } finally {
                state.aiLoading = false;
                renderAiSidebar();
            }
        }

        // ─── SEARCH ───
        async function performSearch(query) {
            const params = new URLSearchParams(location.search);
            if (query) params.set("q", query);
            else params.delete("q");
            const newUrl = params.toString() ? `?${params.toString()}` : location.pathname;
            history.pushState({ query }, "", newUrl);

            state.query = query;
            state.searched = true;
            state.loading = true;
            state.results = [];
            state.page = 0;
            state.allLoaded = false;
            state.answers = [];
            state.corrections = [];
            state.suggestions = [];
            state.news = [];
            state.newsLoaded = false;
            state.aiOverview = null;
            state.aiLoading = false;
            state.aiModelUsed = null;
            state.aiSources = [];
            state.startTime = performance.now();

            heroLanding.classList.add("hidden");
            quickActions.classList.add("hidden");
            searchGlass.classList.add("compacted");
            tabs.style.display = "flex";
            mainLayout.style.display = "flex";
            searchClear.style.display = "none";
            resultsSearchInput.value = query;
            resultsSearchClear.style.display = "flex";
            moveTabPill($(".tab.active"));

            // Always show AI sidebar placeholder (if general)
            if (state.category === "general") {
                aiSidebarCol.style.display = "block";
                aiSidebar.style.display = "block";
                renderAiSidebar(); // show loading or prompt
            }

            renderResults();
            if (state.category === "general") fetchWiki(query);
            await fetchResults(query, 0);
            if (state.category === "general") fetchNews(query);
            if (state.category === "general") fetchAiOverview(query);

            setupInfiniteScroll();
        }

        async function fetchResults(query, page) {
            const url = buildSearchUrl(query, page + 1);
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const newResults = data.results || [];

                if (page === 0) {
                    state.results = newResults;
                    state.answers = data.answers || [];
                    state.corrections = data.corrections || [];
                    state.suggestions = (data.suggestions || []).slice(0, 6);
                } else {
                    state.results = [...state.results, ...newResults];
                }

                if (newResults.length < 10) state.allLoaded = true;
                state.page = page;
            } catch (err) {
                console.error("Search failed:", err);
                if (page === 0) state.results = [];
                showToast(page === 0 ? "Couldn't reach the search instance." : "Couldn't load more results.");
            } finally {
                state.loading = false;
                state.loadingMore = false;
                renderResults();
            }
        }

        async function fetchNews(query) {
            const url = buildSearchUrl(query, 1, "news");
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                state.news = (data.results || []).slice(0, 4);
            } catch (err) {
                console.error("News fetch failed:", err);
                state.news = [];
            } finally {
                state.newsLoaded = true;
                renderResults();
            }
        }

        async function loadMore() {
            if (state.loadingMore || state.allLoaded) return;
            state.loadingMore = true;
            showScrollLoader();
            await fetchResults(state.query, state.page + 1);
            hideScrollLoader();
        }

        function setupInfiniteScroll() {
            window.onscroll = null;
            window.onscroll = () => {
                if (!state.searched || state.allLoaded) return;
                const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
                if (scrollTop + clientHeight >= scrollHeight - 400) {
                    loadMore();
                }
            };
        }

        async function fetchWiki(query) {
            wikiCard.style.display = "";
            sidebarCol.style.display = "";
            wikiCard.innerHTML =
                `<div class="wiki-loading"><div class="loader"><div class="loader-ring"></div><div class="loader-ring"></div></div></div>`;

            try {
                const searchUrl =
                    `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=pageimages|extracts&exintro=true&explaintext=true&piprop=original&pilimit=1&redirects=1&origin=*&titles=${encodeURIComponent(query)}`;
                const res = await fetch(searchUrl);
                const data = await res.json();
                const pages = data.query?.pages;
                if (!pages) throw new Error("no pages");

                const page = Object.values(pages)[0];
                if (!page || page.missing !== undefined) throw new Error("not found");

                const extract = page.extract || "";
                const image = page.original?.source || null;
                const title = page.title || query;

                wikiCard.innerHTML = `
                    ${image ? `<img class="wiki-image" src="${image}" alt="${escapeHtml(title)}" loading="lazy" />` : `<div class="wiki-image-placeholder">🍒</div>`}
                    <div class="wiki-content">
                        <div class="wiki-title">${escapeHtml(title)}</div>
                        <div class="wiki-description">From Wikipedia</div>
                        <p class="wiki-extract">${escapeHtml(extract)}</p>
                        <a class="wiki-link" href="https://en.wikipedia.org/wiki/${encodeURIComponent(title)}" target="_blank" rel="noopener noreferrer">
                            Read more
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
                        </a>
                    </div>
                `;
            } catch {
                wikiCard.innerHTML = "";
                wikiCard.style.display = "none";
                sidebarCol.style.display = "none";
            }
        }

        function renderResults() {
            resultsContainer.innerHTML = "";

            if (state.loading) {
                resultsContainer.innerHTML =
                    `<div class="skeleton-list">${Array.from({ length: 6 }).map(() => `
                        <div class="result-card skeleton-card">
                            <div class="skeleton-line" style="width:28%;height:11px;margin-bottom:12px"></div>
                            <div class="skeleton-line" style="width:65%;height:16px;margin-bottom:9px"></div>
                            <div class="skeleton-line" style="width:92%;height:12px;margin-bottom:6px"></div>
                            <div class="skeleton-line" style="width:55%;height:12px"></div>
                        </div>`).join("")}</div>`;
                return;
            }

            if (state.searched && state.results.length === 0 && !state.answers.length) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <p class="no-results-title">No results for "${escapeHtml(state.query)}"</p>
                        <p class="no-results-sub">Try different keywords or check your instance</p>
                    </div>`;
                const sug = renderSuggestions();
                if (sug) resultsContainer.appendChild(sug);
                return;
            }

            if (state.results.length === 0 && !state.answers.length) return;

            if (state.corrections.length) {
                const corr = document.createElement("div");
                corr.className = "correction-banner";
                corr.innerHTML = `Showing results for <strong>${escapeHtml(state.corrections[0])}</strong>`;
                resultsContainer.appendChild(corr);
            }

            if (state.answers.length) {
                const ans = document.createElement("div");
                ans.className = "answer-card";
                const answerText = typeof state.answers[0] === "object" ? (state.answers[0].answer || state.answers[0]
                    .value || JSON.stringify(state.answers[0])) : state.answers[0];
                ans.innerHTML = `
                    <div class="answer-icon">⚡</div>
                    <div><div class="answer-eyebrow">Quick answer</div><div class="answer-text">${escapeHtml(answerText)}</div></div>`;
                resultsContainer.appendChild(ans);
            }

            const elapsed = ((performance.now() - state.startTime) / 1000).toFixed(1);

            if (state.category === "images") {
                const header = document.createElement("div");
                header.className = "results-header";
                header.innerHTML =
                    `<div class="results-stats"><span class="results-count">${state.results.length}</span><span class="results-time">images · ${elapsed}s</span></div>`;
                resultsContainer.appendChild(header);

                const grid = document.createElement("div");
                grid.className = "image-grid";
                state.results.forEach(r => {
                    let hostname = "";
                    try { hostname = new URL(r.url).hostname.replace(/^www\./, ""); } catch {}
                    const thumb = r.thumbnail || r.img_src || "";
                    const card = document.createElement("a");
                    card.className = "image-card";
                    card.href = r.url;
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";
                    card.innerHTML = `
                        ${thumb ? `<img src="${escapeHtml(thumb)}" alt="${escapeHtml(r.title)}" loading="lazy" />` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:rgba(128,128,128,0.06)">🖼️</div>`}
                        <div class="image-card-overlay"><div class="image-card-title">${escapeHtml(r.title)}</div><div class="image-card-source">${escapeHtml(hostname)}</div></div>`;
                    card.addEventListener("click", (e) => {
                        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
                        e.preventDefault();
                        openLightbox(state.results.indexOf(r));
                    });
                    grid.appendChild(card);
                });
                resultsContainer.appendChild(grid);
            } else {
                const header = document.createElement("div");
                header.className = "results-header";
                header.innerHTML =
                    `<div class="results-stats"><span class="results-count">${state.results.length}</span><span class="results-time">results · ${elapsed}s</span></div>`;
                resultsContainer.appendChild(header);

                const list = document.createElement("div");
                list.className = "results";
                state.results.forEach((r, i) => {
                    let hostname = "";
                    try { hostname = new URL(r.url).hostname.replace(/^www\./, ""); } catch {}
                    const snippet = r.content ? `<p class="result-snippet">${escapeHtml(r.content)}</p>` : "";
                    const isTop = i === 0;
                    const faviconColor = getFaviconColor(hostname);
                    const faviconLetter = getFaviconLetter(hostname);

                    const card = document.createElement("a");
                    card.className = "result-card" + (isTop ? " top-result" : "");
                    card.href = r.url;
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";

                    if (isTop) {
                        card.innerHTML = `
                            <img class="top-result-favicon" src="${getFaviconUrl(hostname)}" alt="${faviconLetter}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy" />
                            <div class="top-result-badge" style="display:none;background:linear-gradient(160deg, ${faviconColor}, ${shade(faviconColor, -22)})">${faviconLetter}</div>
                            <div class="top-result-body">
                                <div class="result-url-bar">
                                    <span class="result-host">${escapeHtml(hostname)}</span>
                                    <span class="result-engine">${escapeHtml(r.engine)}</span>
                                </div>
                                <h3 class="result-title">${escapeHtml(r.title)}</h3>
                                ${snippet}
                            </div>`;
                    } else {
                        card.innerHTML = `
                            <div class="result-url-bar">
                                <img class="result-favicon" src="${getFaviconUrl(hostname)}" alt="${faviconLetter}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy" />
                                <div class="result-favicon-letter" style="display:none;background:${faviconColor}">${faviconLetter}</div>
                                <span class="result-host">${escapeHtml(hostname)}</span>
                                <span class="result-engine">${escapeHtml(r.engine)}</span>
                            </div>
                            <h3 class="result-title">${escapeHtml(r.title)}</h3>
                            ${snippet}`;
                    }
                    list.appendChild(card);

                    if (i === 0 && state.category === "general" && state.news.length) {
                        list.appendChild(buildNewsRail());
                    }

                    if (i === 2) {
                        const sug = renderSuggestions();
                        if (sug) list.appendChild(sug);
                    }
                });
                resultsContainer.appendChild(list);
            }

            if (state.loadingMore) showScrollLoader();
            else if (!state.allLoaded && state.results.length >= 10) {
                const sentinel = document.createElement("div");
                sentinel.className = "scroll-loader";
                sentinel.id = "scroll-loader";
                sentinel.innerHTML =
                    `<div class="loader" style="width:20px;height:20px"><div class="loader-ring" style="border-width:2px"></div></div><span class="scroll-loader-text">Loading more...</span>`;
                resultsContainer.appendChild(sentinel);
            }
        }

        function buildNewsRail() {
            const section = document.createElement("div");
            section.className = "news-rail-section";
            const railHeader = document.createElement("div");
            railHeader.className = "news-rail-header";
            railHeader.innerHTML = `
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
                <span>In the news</span>`;
            section.appendChild(railHeader);

            const buildCard = (n, variant) => {
                let hostname = "";
                try { hostname = new URL(n.url).hostname.replace(/^www\./, ""); } catch {}
                const thumb = n.thumbnail || n.img_src || "";
                const card = document.createElement("a");
                card.className = `news-card ${variant}`;
                card.href = n.url;
                card.target = "_blank";
                card.rel = "noopener noreferrer";
                card.innerHTML = `
                    ${thumb ? `<img class="news-card-img" src="${escapeHtml(thumb)}" alt="" loading="lazy" />` : `<div class="news-card-img news-card-img-placeholder">📰</div>`}
                    <div class="news-card-body">
                        <span class="news-card-source">${escapeHtml(hostname)}</span>
                        <h4 class="news-card-title">${escapeHtml(n.title)}</h4>
                    </div>`;
                return card;
            };

            const rail = document.createElement("div");
            rail.className = "news-rail";
            const [lead, ...rest] = state.news;
            if (lead) rail.appendChild(buildCard(lead, "lead"));
            const minorWrap = document.createElement("div");
            minorWrap.className = "news-rail-minor";
            rest.slice(0, 3).forEach(n => minorWrap.appendChild(buildCard(n, "minor")));
            rail.appendChild(minorWrap);
            section.appendChild(rail);
            return section;
        }

        function renderSuggestions() {
            if (!state.suggestions.length) return;
            const section = document.createElement("div");
            section.className = "related-section";
            section.innerHTML = `<div class="related-title">Related searches</div>`;
            const list = document.createElement("div");
            list.className = "related-list";
            state.suggestions.forEach(s => {
                const item = document.createElement("button");
                item.className = "related-item";
                item.type = "button";
                item.innerHTML =
                    `<span>${escapeHtml(s)}</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
                item.addEventListener("click", () => {
                    searchInput.value = s;
                    searchClear.style.display = "flex";
                    performSearch(s);
                });
                list.appendChild(item);
            });
            section.appendChild(list);
            return section;
        }

        function showScrollLoader() {
            let loader = $("#scroll-loader");
            if (!loader) {
                loader = document.createElement("div");
                loader.id = "scroll-loader";
                loader.className = "scroll-loader";
                loader.innerHTML =
                    `<div class="loader" style="width:20px;height:20px"><div class="loader-ring" style="border-width:2px"></div></div><span class="scroll-loader-text">Loading more...</span>`;
                resultsContainer.appendChild(loader);
            }
            loader.classList.remove("hidden");
        }

        function hideScrollLoader() {
            const loader = $("#scroll-loader");
            if (loader) loader.classList.add("hidden");
        }

        function escapeHtml(str) {
            const d = document.createElement("div");
            d.textContent = str;
            return d.innerHTML;
        }

        // ─── TAB PILL ───
        function moveTabPill(tabEl) {
            if (!tabEl || !tabPill || !tabsGlass) return;
            const glassRect = tabsGlass.getBoundingClientRect();
            const tabRect = tabEl.getBoundingClientRect();
            const x = tabRect.left - glassRect.left;
            tabPill.style.width = `${tabRect.width}px`;
            tabPill.style.transform = `translateX(${x}px)`;
            tabPill.classList.add("ready");
        }

        // ─── TOAST ───
        function showToast(message) {
            if (!toastContainer) return;
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML =
                `<svg class="toast-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${escapeHtml(message)}</span>`;
            toastContainer.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add("visible"));
            setTimeout(() => {
                toast.classList.remove("visible");
                setTimeout(() => toast.remove(), 250);
            }, 3500);
        }

        // ─── IMAGE LIGHTBOX ───
        let lightboxIndex = -1;
        function openLightbox(i) {
            const imgs = state.results;
            const r = imgs[i];
            if (!r) return;
            lightboxIndex = i;
            let hostname = "";
            try { hostname = new URL(r.url).hostname.replace(/^www\./, ""); } catch {}
            lightboxImg.src = r.img_src || r.thumbnail || "";
            lightboxImg.alt = r.title || "";
            lightboxTitle.textContent = r.title || "";
            lightboxSource.textContent = hostname;
            lightboxSource.href = r.url;
            lightbox.classList.add("visible");
            document.body.style.overflow = "hidden";
        }
        function closeLightbox() {
            lightbox.classList.remove("visible");
            document.body.style.overflow = "";
            lightboxIndex = -1;
        }
        function navLightbox(delta) {
            if (lightboxIndex < 0 || !state.results.length) return;
            const next = (lightboxIndex + delta + state.results.length) % state.results.length;
            openLightbox(next);
        }
        lightboxClose.addEventListener("click", closeLightbox);
        lightboxPrev.addEventListener("click", () => navLightbox(-1));
        lightboxNext.addEventListener("click", () => navLightbox(1));
        lightbox.addEventListener("click", (e) => {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener("keydown", (e) => {
            if (!lightbox.classList.contains("visible")) return;
            if (e.key === "Escape") closeLightbox();
            else if (e.key === "ArrowLeft") navLightbox(-1);
            else if (e.key === "ArrowRight") navLightbox(1);
        });

        let resizeTimer;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                positionAiSidebar();
                if (state.aiOverview || state.aiLoading || (state.searched && state.category === "general")) {
                    renderAiSidebar();
                }
                const activeTab = $(".tab.active");
                if (activeTab && tabs.style.display !== "none") moveTabPill(activeTab);
            }, 200);
        });

        init();
    </script>
</body>
</html>
